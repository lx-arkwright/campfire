# Campfire — hardening for the CloudPanel reverse-proxy vhost.
#
# CloudPanel generates the vhost at
# /etc/nginx/sites-enabled/campfire.arkwright.work.conf when you create the
# Reverse Proxy site. Its template already proxies to 127.0.0.1:3002 and includes
# the WebSocket `Upgrade`/`Connection` headers Socket.io needs.
#
# After the site is created, apply these three edits to that file, then:
#   nginx -t && systemctl reload nginx
#
# 1. No request logging at the origin (matches the app's privacy promise).
#    Replace the generated `access_log .../access.log main;` line with:
#
#      access_log off;
#
# 2. Lock the origin to Cloudflare. Paste the contents of cloudflare-allow.conf
#    (allow <cloudflare ranges>; deny all;) right AFTER the `error_log ...;` line,
#    at the server-block level.
#
# 3. Keep the app IP-blind. In the `location @reverse_proxy { ... }` block, blank
#    the client-IP headers so the Node app never receives them:
#
#      proxy_set_header X-Real-IP "";
#      proxy_set_header X-Forwarded-For "";
#
# NOTE: the app itself sets Content-Security-Policy, X-Content-Type-Options,
# X-Frame-Options and Referrer-Policy in production (server/index.js) — don't
# re-add them here or you'll get duplicate headers.
#
# NOTE: editing this site in the CloudPanel UI may regenerate the vhost and wipe
# these edits — re-apply them if that happens.
